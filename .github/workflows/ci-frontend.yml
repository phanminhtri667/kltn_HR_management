name: CI Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}
  GHCR: ghcr.io/${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout source code
        uses: actions/checkout@v4

      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PASS_TOKEN }}

      - name: 🔍 Debug info
        run: |
          echo "Repository: $REPO_NAME"
          echo "GitHub SHA: $IMAGE_TAG"
          echo "GHCR: $GHCR"
          echo "Files in ./client:"
          ls -R ./client

      - name: 🐳 Build & Push Frontend Image
        run: |
          SAFE_REPO=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          IMAGE_NAME="$GHCR/$SAFE_REPO-frontend:${IMAGE_TAG}"
          echo "🚀 Building image: $IMAGE_NAME"
          docker build \
            --build-arg REACT_APP_API_URL=http://hr.thongtri.com/api \
            -t "$IMAGE_NAME" ./client
          docker push "$IMAGE_NAME"

